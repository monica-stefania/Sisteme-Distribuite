<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magazin</title>
    <style>
         body{
            background-color: ivory;
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 16px;
        }
        .form-login {
            border: 2px solid cadetblue;
            border-radius: 8px;
            background-color: AliceBlue;
            padding: 20px 30px;
            display: inline-block;
        }
        h1{
            color: cadetblue;
        }
        input{
            width: 200px;
            margin-bottom: 10px;
            padding: 5px;
            box-sizing: border-box;
        }
        button {
            width: 200px;
            background-color: ivory;
            color: cadetblue;
            padding: 10px;
            border: 2px solid cadetblue;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover{
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="form-login">
    <h1>Autentifică-te</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul style="color: red;">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form action="/login" method="POST">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="parola">Parolă:</label>
        <input type="password" id="parola" name="parola" required>
        <br>
        <button type="submit">Autentificare</button>
    </form>
    </div>
    <p>Nu ai cont? <a href="/register-view">Înregistrează-te aici</a>.</p>
</body>
</html>
