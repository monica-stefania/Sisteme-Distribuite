<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magazin</title>
    <style>
        body{
            background-color: ivory;
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 16px;
        }
        .form-register {
            border: 2px solid cadetblue;
            border-radius: 8px;
            background-color: AliceBlue;
            padding: 20px 30px;
            display: inline-block;
        }
        h1{
            color: cadetblue;
        }
        input{
            width: 200px;
            margin-bottom: 10px;
            padding: 5px;
            box-sizing: border-box;
        }
        button {
            width: 200px;
            background-color: ivory;
            color: cadetblue;
            padding: 10px;
            border: 2px solid cadetblue;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover{
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="form-register">
    <h1>Inregistreaza-te</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul style="color: red;">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form action="/register" method="POST">
        <label for="nume">Nume:</label>
        <input type="text" id="nume" name="nume" required>
        <br>
        <label for="prenume">Prenume:</label>
        <input type="text" id="prenume" name="prenume" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="parola">Parolă:</label>
        <input type="password" id="parola" name="parola" required>
        <br>
        <label for="telefon">Numar de telefon:</label>
        <input type="text" id="telefon" name="telefon">
        <br>
        <label for="adresaLivrare">Adresa de Livrare:</label>
        <input type="text" id="adresaLivrare" name="adresaLivrare" required>
        <br>
        <label for="adresaFacturare">Adresa de Facturare:</label>
        <input type="text" id="adresaFacturare" name="adresaFacturare" required>
        <br>
        <button type="submit">Creează Cont</button>
    </form>
    </div>
    <p>Ai deja cont? <a href="/">Autentifică-te aici</a>.</p>
</body>
</html>
